<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prendas Donadas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .counter-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid #e9ecef;
        }

        .counter-label {
            color: #6c757d;
            font-size: 1rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .counter-number {
            color: #28a745;
            font-size: 4.5em;
            font-weight: bold;
            margin: 10px 0;
        }

        .counter-unit {
            color: #6c757d;
            font-size: 1rem;
        }

        .message {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #e9ecef;
        }

        .message p {
            color: #495057;
            font-size: 1rem;
            line-height: 1.5;
        }

        .heart {
            color: #dc3545;
            font-size: 1.2rem;
        }

        .last-update {
            font-size: 0.75rem;
            color: #adb5bd;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .counter-number {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prendas Donadas</h1>
        
        <div class="counter-box">
            <div class="counter-label">¡Gracias por tu generosidad!</div>
            <div class="counter-number" id="counter">14</div>
            <div class="counter-unit">Prendas Donadas</div>
        </div>

        <div class="message">
            <p>✨ Cada prenda donada ayuda a transformar vidas ✨</p>
            <p class="heart">❤️ ¡Sigue así! ❤️</p>
        </div>

        <div class="last-update" id="lastUpdate"></div>
    </div>
</body>
</html>
