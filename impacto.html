<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prendas Donadas - RevistaTE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        h1::before {
            content: "👕";
            font-size: 1em;
        }

        h1::after {
            content: "👖";
            font-size: 1em;
        }

        .counter-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .counter-label {
            color: white;
            font-size: 1.2em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .counter-number {
            color: white;
            font-size: 5em;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .counter-unit {
            color: rgba(255,255,255,0.9);
            font-size: 1.1em;
        }

        .message {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .message p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.5;
        }

        .heart {
            color: #ff6b6b;
            font-size: 1.2em;
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }

        .last-update {
            font-size: 0.8em;
            color: #aaa;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .counter-number {
                font-size: 3.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prendas Donadas</h1>
        
        <div class="counter-box">
            <div class="counter-label">¡Gracias por tu generosidad!</div>
            <div class="counter-number" id="counter">0</div>
            <div class="counter-unit">Prendas Donadas</div>
        </div>

        <div class="message">
            <p>✨ Cada prenda donada ayuda a transformar vidas ✨</p>
            <p class="heart">❤️ ¡Sigue así! ❤️</p>
        </div>

        <div class="footer">
            <p>RevistaTE - Donaciones que cambian vidas</p>
            <div class="last-update" id="lastUpdate"></div>
        </div>
    </div>

    <script>
        // Función para obtener el contador desde el archivo JSON
        async function getCounter() {
            try {
                const response = await fetch('counter_data.json?' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    return data.counter;
                } else {
                    console.error('Error fetching counter');
                    return 0;
                }
            } catch (error) {
                console.error('Error:', error);
                return 0;
            }
        }

        // Función para actualizar el contador en la página
        async function updateCounter() {
            const counter = await getCounter();
            document.getElementById('counter').textContent = counter;
            
            // Actualizar fecha de última actualización
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                `Última actualización: ${now.toLocaleString()}`;
        }

        // Actualizar cada 30 segundos
        updateCounter();
        setInterval(updateCounter, 30000);
    </script>
</body>
</html>
